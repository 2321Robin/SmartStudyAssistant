services:
  nacos:
    image: nacos/nacos-server:v2.4.3
    environment:
      MODE: standalone
    ports:
      - "127.0.0.1:8848:8848"

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: "%"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -proot"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7.4-alpine
    ports:
      - "127.0.0.1:6379:6379"

  gateway-service:
    image: maven:3.9.9-eclipse-temurin-17
    working_dir: /workspace/backend
    command: mvn -pl gateway-service -am spring-boot:run
    environment:
      SMARTSTUDY_JWT_SECRET: ${SMARTSTUDY_JWT_SECRET:-smartstudy-local-demo-secret}
      USER_SERVICE_URI: http://user-service:8081
      PLAN_SERVICE_URI: http://plan-service:8082
      RESOURCE_SERVICE_URI: http://resource-service:8083
      NOTE_SERVICE_URI: http://note-service:8084
    volumes:
      - ../backend:/workspace/backend
      - maven-repo:/root/.m2
    ports:
      - "8080:8080"
    depends_on:
      - nacos
      - user-service
      - plan-service
      - resource-service
      - note-service

  user-service:
    image: maven:3.9.9-eclipse-temurin-17
    working_dir: /workspace/backend
    command: mvn -pl user-service -am spring-boot:run -Dspring-boot.run.jvmArguments=-Dserver.port=8081
    environment:
      SMARTSTUDY_JWT_SECRET: ${SMARTSTUDY_JWT_SECRET:-smartstudy-local-demo-secret}
      SMARTSTUDY_USER_DB_URL: jdbc:mysql://mysql:3306/smartstudy_user?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SMARTSTUDY_USER_DB_USERNAME: root
      SMARTSTUDY_USER_DB_PASSWORD: root
    volumes:
      - ../backend:/workspace/backend
      - maven-repo:/root/.m2
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      mysql:
        condition: service_healthy

  plan-service:
    image: maven:3.9.9-eclipse-temurin-17
    working_dir: /workspace/backend
    command: mvn -pl plan-service -am spring-boot:run
    volumes:
      - ../backend:/workspace/backend
      - maven-repo:/root/.m2
    ports:
      - "127.0.0.1:8082:8082"
    depends_on:
      - nacos
      - redis

  resource-service:
    image: maven:3.9.9-eclipse-temurin-17
    working_dir: /workspace/backend
    command: mvn -pl resource-service -am spring-boot:run
    volumes:
      - ../backend:/workspace/backend
      - maven-repo:/root/.m2
    ports:
      - "127.0.0.1:8083:8083"
    depends_on:
      - nacos
      - redis

  note-service:
    image: maven:3.9.9-eclipse-temurin-17
    working_dir: /workspace/backend
    command: mvn -pl note-service -am spring-boot:run
    volumes:
      - ../backend:/workspace/backend
      - maven-repo:/root/.m2
    ports:
      - "127.0.0.1:8084:8084"
    depends_on:
      - nacos
      - redis

  web-client:
    image: node:20-alpine
    working_dir: /workspace/web-client
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 4173"
    environment:
      VITE_PROXY_TARGET: http://gateway-service:8080
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ../web-client:/workspace/web-client
    ports:
      - "4173:4173"
    depends_on:
      - gateway-service

volumes:
  mysql-data:
  maven-repo:
